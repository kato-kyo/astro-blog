# Deploy: Cloudflare Pages へのビルド & デプロイ
#
# - main  → production (PUBLIC_APP_ENV=production)
# - develop → preview   (PUBLIC_APP_ENV=preview)
# - workflow_dispatch で任意の commit を手動再デプロイ可能（§8.8 ロールバック）
# - Cloudflare 側の Git 連携自動デプロイは無効化済み。本ワークフローに一本化（§8.6）
# - 詳細は docs/requirements.md §8.5 / §8.6 / §8.7 を参照
name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

# 同じブランチの古い deploy はキャンセル（Free tier のビルド数節約）
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # content/ は private submodule。CONTENT_PAT が必須。
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CONTENT_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ブランチに応じて PUBLIC_APP_ENV を切替（§8.3 環境別の振る舞い）
      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "public_app_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "public_app_env=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          PUBLIC_APP_ENV: ${{ steps.env.outputs.public_app_env }}
        run: pnpm build

      # wrangler pages deploy で dist/ を Cloudflare Pages にアップロード。
      # プロジェクト名は astro-blog を仮置き。Cloudflare 側で別名を使っている場合は projectName を調整。
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=astro-blog --branch=${{ github.ref_name }}
