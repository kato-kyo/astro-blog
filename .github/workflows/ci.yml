# CI: 型チェック・ユニットテスト・ビルド検証
#
# - PR（全ブランチ）と main / develop への push で実行
# - 同一 ref の古い実行は concurrency でキャンセル（Cloudflare Free tier のビルド数節約にも寄与）
# - 詳細は docs/requirements.md §8.5 / §8.7 を参照
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

# 同じブランチの古い実行はキャンセル（ビルド数節約・フィードバック高速化）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: check / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # content/ は private submodule。
      # `CONTENT_PAT` は private repo の read 権限を持つ Personal Access Token。
      # 未設定の場合は checkout で失敗するので、リポジトリの Secrets に登録しておくこと。
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CONTENT_PAT }}

      # pnpm を Node.js より先にインストールしておくことで setup-node の cache: 'pnpm' が機能する
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (astro check)
        run: pnpm check

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Build (astro build)
        run: pnpm build

      # ビルド成果物 `dist/` を再利用し、スモーク観点（§7.2）を検証する。
      # 直前の build ステップで生成された dist/ をそのまま使うため `test:smoke:only` を利用。
      - name: Smoke tests (dist/ verification)
        run: pnpm test:smoke:only

      # Lighthouse CI: 4 ページを 3 回計測し median で閾値 90 を検証（F-30, §9.1）。
      # Chromium は ubuntu-latest に preinstalled。dist/ を staticDistDir で直接計測するため別サーバー不要。
      - name: Lighthouse CI (performance / a11y / best-practices / SEO >= 90)
        run: pnpm lhci
